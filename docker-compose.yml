services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: taskmanager-app
    container_name: taskmanager_app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - .:/var/www
    networks:
      - taskmanager
    depends_on:
      mysql:
        condition: service_healthy

  nginx:
    image: nginx:alpine
    container_name: taskmanager_nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - .:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - taskmanager
    depends_on:
      - app

  mysql:
    image: mysql:8.0
    container_name: taskmanager_mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: taskmanager
      MYSQL_ROOT_PASSWORD: secret
      MYSQL_USER: taskuser
      MYSQL_PASSWORD: secret
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - taskmanager
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-psecret"]
      interval: 10s
      timeout: 5s
      retries: 5

  queue:
    image: taskmanager-app
    container_name: taskmanager_queue
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - .:/var/www
    command: php artisan queue:work --sleep=3 --tries=3 --timeout=60
    networks:
      - taskmanager
    depends_on:
      mysql:
        condition: service_healthy

networks:
  taskmanager:
    driver: bridge

volumes:
  mysql_data:
